<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Standardized PE &amp; OSCE Rubric Builder</title>
<style>
  :root{
    --paper:#FBFCFD; --sheet:#FFFFFF; --ink:#1B2A3A; --muted:#5B6B7B;
    --accent:#1F4E78; --accent-soft:#EAF1F8; --line:#D7DFE7; --line-soft:#E8EEF3;
    --local:#8A4B12; --local-bg:#FDF3E7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Avenir Next","Avenir","Seravek","Segoe UI",system-ui,sans-serif;
    font-size:15px; line-height:1.45;
  }
  button{font:inherit; cursor:pointer}

  .topbar{display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:12px 22px; background:var(--accent); color:#fff}
  .topbar h1{font-size:16.5px; margin:0; font-weight:600; letter-spacing:.2px}
  .topbar .sub{font-size:12px; opacity:.72}
  .topbar .spacer{flex:1}
  .modeswitch{display:flex; background:rgba(255,255,255,.12); border-radius:6px; padding:3px}
  .modeswitch button{background:none; border:none; color:#fff; opacity:.8; padding:6px 14px; border-radius:4px; font-size:13px; font-weight:600}
  .modeswitch button.on{background:#fff; color:var(--accent); opacity:1}
  .chip{background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.25); border-radius:4px; padding:4px 10px; font-size:13px; font-variant-numeric:tabular-nums}
  .btn-print{background:#fff; color:var(--accent); border:none; border-radius:4px; padding:7px 14px; font-weight:600; font-size:13px}
  .btn-print.ghost{background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.35)}
  .btn-print:hover{background:#E9F0F7; color:var(--accent)}
  .btn-print.ghost:hover{background:rgba(255,255,255,.24); color:#fff}
  .btn-print:focus-visible,.toggle input:focus-visible,button:focus-visible,input.ck:focus-visible,.pick:focus-visible{outline:2px solid #9DB7D6; outline-offset:2px}

  .wrap{display:flex; gap:26px; padding:22px; max-width:1360px; margin:0 auto; align-items:flex-start}
  aside{width:300px; flex:0 0 300px; display:flex; flex-direction:column; gap:16px}
  main{flex:1; min-width:0}
  @media (max-width:900px){ .wrap{flex-direction:column} aside{width:100%; flex:1 1 auto} }

  .panel{background:var(--sheet); border:1px solid var(--line); border-radius:6px; padding:14px 16px}
  .panel h2{margin:0 0 10px; font-size:11.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--muted)}
  .toggle{display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13.8px}
  .toggle input{accent-color:var(--accent)}
  .toggle .pts{margin-left:auto; color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums}
  .radio{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:14px}
  .radio input{accent-color:var(--accent)}
  .mini{display:flex; gap:8px; margin-top:8px}
  .mini button{flex:1; border:1px solid var(--line); background:#fff; border-radius:4px; padding:4px 0; font-size:12.5px; color:var(--accent); font-weight:600}
  .mini button:hover{background:var(--accent-soft)}
  .rulebox{background:var(--accent-soft); border:1px solid #C9D9E8; border-radius:6px; padding:13px 15px; font-size:13px}
  .rulebox h2{color:var(--accent)}
  .rulebox p{margin:0 0 8px}
  .rulebox p:last-child{margin:0}
  .rulebox b{color:var(--accent)}
  .raters{display:flex; flex-direction:column; gap:9px; margin-top:6px}
  .rater{display:flex; gap:9px; align-items:flex-start; font-size:12.5px}
  .rater .k{flex:0 0 74px; font-weight:700; color:var(--accent)}
  .about{font-size:12px; color:var(--muted)}
  .about p{margin:0 0 7px}

  .sheet{background:var(--sheet); border:1px solid var(--line); border-radius:6px; padding:34px 40px 40px; box-shadow:0 1px 3px rgba(27,42,58,.07)}
  .sheet-head{border-bottom:3px solid var(--accent); padding-bottom:14px; margin-bottom:6px}
  .sheet-head .prog{font-size:12px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); border-bottom:1px dashed transparent; min-width:120px; display:inline-block}
  .sheet-head .prog:hover,.sheet-head .prog:focus{border-bottom-color:var(--muted); outline:none}
  .sheet-head h2{margin:2px 0 4px; font-size:23px; font-weight:700; color:var(--accent); text-wrap:balance}
  .sheet-head .meta{font-size:12.5px; color:var(--muted)}
  .idline{display:flex; gap:30px; margin:14px 0 4px; font-size:13px; color:var(--muted); flex-wrap:wrap}
  .idline span{flex:1; min-width:150px; border-bottom:1px solid var(--line); padding-bottom:3px}
  .idline .live{color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums}

  section.sys{margin-top:24px; break-inside:avoid-page}
  .sys-head{display:flex; align-items:baseline; gap:10px; background:var(--accent); color:#fff; border-radius:4px 4px 0 0; padding:7px 14px}
  .sys-head h3{margin:0; font-size:15px; font-weight:600; letter-spacing:.2px}
  .sys-head .pts{margin-left:auto; font-size:12.5px; opacity:.85; font-variant-numeric:tabular-nums}
  .ros{border-left:3px solid #9DB7D6; background:var(--accent-soft); margin:0; padding:7px 14px; font-size:13px}
  .ros b{color:var(--accent)}
  table.items{width:100%; border-collapse:collapse; border:1px solid var(--line-soft); border-top:none}
  tr.phase td{background:var(--accent); color:#fff; padding:6px 14px; font-size:11px; font-weight:700; letter-spacing:.13em; text-transform:uppercase}
  .ghead td{padding:7px 14px 4px; font-size:11.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--accent); border-top:1px solid var(--line-soft); background:#F3F7FA}
  tr.item td{border-top:1px solid var(--line-soft); padding:5px 8px; vertical-align:top}
  tr.item:hover td{background:#F6F9FB}
  td.bx{width:34px; text-align:center; padding-top:6px}
  input.ck{width:15px; height:15px; accent-color:var(--accent); cursor:pointer; margin:0}
  td.score{width:70px; text-align:right; white-space:nowrap; color:var(--muted); font-size:12.5px; font-variant-numeric:tabular-nums; padding-right:14px; padding-top:6px}
  td.opts{width:104px; text-align:right; white-space:nowrap; padding-right:12px; padding-top:4px}
  .pick{display:inline-block; min-width:22px; text-align:center; border:1px solid var(--line); border-radius:3px; padding:1px 4px; margin-left:4px; font-size:12.5px; color:#8794A2; cursor:pointer; user-select:none; font-variant-numeric:tabular-nums}
  .pick:hover{border-color:var(--accent); color:var(--accent)}
  .pick.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700}
  tr.local td{background:var(--local-bg)}
  tr.local:hover td{background:#FBEBD6}
  .local-chip{display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--local); border:1px solid var(--local); border-radius:3px; padding:0 5px; margin-left:7px; vertical-align:1px}
  .rm{border:none; background:none; color:var(--local); font-size:14px; padding:0 4px}
  .addrow td{border-top:1px solid var(--line-soft); padding:5px 8px 7px 8px}
  .addrow input{width:100%; border:1px dashed var(--line); border-radius:4px; padding:5px 9px; font:inherit; font-size:13.5px; background:transparent; color:var(--ink)}
  .addrow input::placeholder{color:#9AA7B4}
  .addrow input:focus{outline:none; border-color:var(--accent); background:#fff}
  .evnote{border:1px solid var(--line-soft); border-top:none; padding:7px 14px; font-size:12.5px; font-style:italic; color:#55636F; background:#FAFBFC}
  .evnote b{color:var(--accent); font-style:normal}
  .osce-banner{background:var(--accent-soft); border:1px solid #C9D9E8; border-radius:6px; padding:11px 15px; font-size:12.5px; margin:16px 0 4px}
  .osce-banner b{color:var(--accent)}
  .sheet-foot{margin-top:30px; font-size:11.5px; color:var(--muted); border-top:1px solid var(--line); padding-top:10px}
  .sheet-foot p{margin:0 0 6px}

  @media print{
    @page{margin:14mm}
    body{background:#fff; font-size:12.5px}
    .topbar,aside{display:none}
    .wrap{padding:0; display:block; max-width:none}
    .sheet{border:none; box-shadow:none; padding:0; border-radius:0}
    section.sys{break-inside:auto}
    .sys-head,tr.phase td{border-radius:0; -webkit-print-color-adjust:exact; print-color-adjust:exact}
    tr.item{break-inside:avoid}
    .rm,.addrow{display:none}
    .pick{border-color:#999}
    .pick.on{background:var(--accent) !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
    tr.local td{background:#F6EFE4 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  }
</style>
</head>
<body>


<div class="topbar">
  <div>
    <h1>The Standardized Physical Examination</h1>
    <div class="sub">Rubric builder — prototype v0.4 · CC BY-NC 4.0</div>
  </div>
  <div class="modeswitch">
    <button id="mComp" class="on" onclick="setMode('comp')">Comprehensive PE</button>
    <button id="mOsce" onclick="setMode('osce')">OSCE / SOAP grading</button>
  </div>
  <div class="spacer"></div>
  <div class="chip" id="scorechip">Score 0 / 0</div>
  <button class="btn-print" onclick="window.print()">Save PDF</button>
  <button class="btn-print ghost" onclick="exportDoc()">Download .doc</button>
</div>
<input type="file" id="cfgfile" accept="application/json,.json" style="display:none" onchange="importConfig(this)">

<div class="wrap">
  <aside id="aside"></aside>
  <main>
    <div class="sheet" id="sheet">
      <div class="sheet-head">
        <span class="prog" id="progname" contenteditable="true" spellcheck="false">Your program name — click to edit</span>
        <h2 id="sheettitle">Standardized Physical Examination Rubric</h2>
        <div class="meta" id="sheetmeta"></div>
        <div class="idline"><span>Student</span><span>Evaluator</span><span>Date</span><span id="sheettot">Score: <span class="live">0</span> / 0</span></div>
      </div>
      <div id="osceBanner"></div>
      <div id="sections"></div>
      <div class="sheet-foot" id="sheetfoot"></div>
    </div>
  </main>
</div>

<script>
const COMP = [
 {
  "title": "Setting the Stage and the Comprehensive History",
  "ros": null,
  "note": null,
  "groups": [
   {
    "name": "Encounter set-up",
    "items": [
     {
      "text": "Professional dress; identification visible"
     },
     {
      "text": "Introduce yourself by name and role"
     },
     {
      "text": "Wash hands in view of the patient"
     },
     {
      "text": "Verify patient name and date of birth"
     },
     {
      "text": "Ask how the patient wishes to be addressed (including pronouns)"
     },
     {
      "text": "Set the agenda and expected visit length"
     }
    ]
   },
   {
    "name": "History",
    "items": [
     {
      "text": "Chief complaint in the patient's own words"
     },
     {
      "text": "Allow an uninterrupted opening statement"
     },
     {
      "text": "HPI: OLDCARTS (Onset, Location, Duration, Character, Alleviating/Aggravating, Radiation, Timing, Severity)"
     },
     {
      "text": "Pertinent positives and negatives for the chief complaint"
     },
     {
      "text": "Past medical history (diagnoses, control, last follow-up)"
     },
     {
      "text": "Surgical history (type, year, indication)"
     },
     {
      "text": "Family history (pertinent to the complaint)"
     },
     {
      "text": "Social history: FED TACOS (Food, Exercise, Drugs, Tobacco, Alcohol, Caffeine, Occupation, Sexual/Safety)"
     },
     {
      "text": "Medications (name, dose, route, frequency)"
     },
     {
      "text": "Allergies (substance and reaction)"
     }
    ]
   }
  ]
 },
 {
  "title": "General Survey and Vital Signs",
  "ros": "Change in weight, fever, fatigue, night sweats, chills.",
  "note": "NEWS2 tracks ward deterioration better than isolated vitals; the Surviving Sepsis Campaign advises against qSOFA as a sole screen (too insensitive). Pair either with a lactate.",
  "groups": [
   {
    "name": "General survey",
    "items": [
     {
      "text": "Level of consciousness and orientation (A&O x4)"
     },
     {
      "text": "Signs of distress"
     },
     {
      "text": "Posture, gait, movement, body build"
     },
     {
      "text": "Grooming, hygiene, body odor, facial expression"
     },
     {
      "text": "Apparent versus stated age and sexual development"
     }
    ]
   },
   {
    "name": "Vital signs",
    "items": [
     {
      "text": "Blood pressure, correct technique",
      "lr": "(hospitalized SBP < 90 predicts mortality, +LR ~15; Holler 2015)",
      "tier": "C"
     },
     {
      "text": "Pulse: rate, rhythm, amplitude"
     },
     {
      "text": "Respiratory rate (count unobtrusively)"
     },
     {
      "text": "Temperature (document route)"
     },
     {
      "text": "Height, weight, and calculated BMI"
     },
     {
      "text": "Pulse oximetry"
     }
    ]
   }
  ]
 },
 {
  "title": "Skin, Hair, and Nails",
  "ros": "Rashes, lumps, sores, itching, dryness, color change; hair or nail changes; new or changing moles.",
  "note": null,
  "groups": [
   {
    "name": "Core examination",
    "items": [
     {
      "text": "Inspect skin: color, moisture, texture",
      "lr": "(central cyanosis, +LR 7.4 for hypoxemia; palmar crease pallor +LR 7.9, palmar pallor +LR 5.6 for anemia)",
      "tier": "B"
     },
     {
      "text": "Palpate skin: temperature, turgor, mobility",
      "lr": "(skin tenting, +LR 3.5 for hypovolemia; less reliable in the elderly)",
      "tier": "C"
     },
     {
      "text": "Inspect and palpate lesions: size, shape, color, asymmetry (ABCDEs), distribution"
     },
     {
      "text": "Inspect and palpate hair and scalp: texture, distribution, moisture"
     },
     {
      "text": "Inspect nails and interdigital spaces; assess for clubbing (Schamroth window)",
      "lr": "(digital clubbing, +LR ~8; Pallares-Sanmartin 2010)",
      "tier": "B"
     }
    ]
   }
  ]
 },
 {
  "title": "Head, Eyes, Ears, Nose, and Throat",
  "ros": "Head: headache, injury, dizziness. Eyes: vision, pain, redness, diplopia, floaters/flashes. Ears: hearing, tinnitus, vertigo, discharge. Nose: congestion, epistaxis, sinus pain. Throat/mouth: dental, gums, sore throat, hoarseness.",
  "note": "For acute vestibular syndrome (continuous vertigo with nystagmus), the HINTS exam is more sensitive than early MRI for posterior-circulation stroke (\u2212LR 0.04; Kattah 2009). It is valid only in true acute vestibular syndrome, and a NORMAL head-impulse test is the worrisome result.",
  "groups": [
   {
    "name": "Head",
    "items": [
     {
      "text": "Inspect and palpate skull: symmetry, shape, deformity, trauma"
     },
     {
      "text": "Inspect scalp and hair"
     },
     {
      "text": "Inspect facial bones and features for symmetry"
     },
     {
      "text": "Palpate the cervical lymph node chain (10 stations)"
     }
    ]
   },
   {
    "name": "Eyes",
    "items": [
     {
      "text": "Inspect position, conjunctiva, sclera, pupils",
      "lr": "(conjunctival rim pallor, +LR 4.5 for anemia; sunken eyes +LR 3.4 for hypovolemia)",
      "tier": "C"
     },
     {
      "text": "Inspect brows, eyelids, lacrimal system"
     },
     {
      "text": "Visual acuity (Snellen)"
     },
     {
      "text": "Visual fields by confrontation"
     },
     {
      "text": "Six cardinal directions of gaze; convergence; accommodation"
     },
     {
      "text": "Ophthalmoscopy: red reflex, iris, cornea"
     },
     {
      "text": "Ophthalmoscopy: pupil and light reaction (PERRLA)",
      "lr": "(consensual photophobia, +LR 28.8 for serious eye disease; wide CI)",
      "tier": "A"
     },
     {
      "text": "Ophthalmoscopy: retina, vessels, optic disc"
     }
    ]
   },
   {
    "name": "Ears",
    "items": [
     {
      "text": "Inspect and palpate the auricle, mastoid, TMJ"
     },
     {
      "text": "Auditory acuity: whisper test at 2\u20133 ft"
     },
     {
      "text": "Finger-rub test bilaterally"
     },
     {
      "text": "Otoscopy bilaterally: canal and tympanic membrane"
     }
    ]
   },
   {
    "name": "Ears \u2014 special tests",
    "items": [
     {
      "text": "Rinne test"
     },
     {
      "text": "Weber test"
     }
    ]
   },
   {
    "name": "Nose",
    "items": [
     {
      "text": "Inspect position, symmetry, skin"
     },
     {
      "text": "Palpate nasal bones; test patency of each nostril"
     },
     {
      "text": "Smell sensation (CN I)"
     },
     {
      "text": "Palpate, percuss, and transilluminate sinuses"
     },
     {
      "text": "Internal inspection with otoscope and speculum"
     }
    ]
   },
   {
    "name": "Mouth and throat",
    "items": [
     {
      "text": "Inspect lips, teeth, gums, tongue, hard/soft palate, pharynx, mucosa"
     },
     {
      "text": "Inspect and palpate the floor of the mouth"
     },
     {
      "text": "Tongue protrusion (CN XII)"
     },
     {
      "text": "Palate rise on \u201cAhh\u201d (CN IX/X); assess swallow"
     }
    ]
   }
  ]
 },
 {
  "title": "Neck",
  "ros": "Swollen glands, goiter, lumps, neck pain or stiffness.",
  "note": null,
  "groups": [
   {
    "name": "Core examination",
    "items": [
     {
      "text": "Inspect neck, thyroid, tracheal position"
     },
     {
      "text": "Observe swallowing for thyroid motion"
     },
     {
      "text": "Palpate the thyroid (behind, during swallow): size, shape, consistency, nodules"
     },
     {
      "text": "Palpate the cervical lymph node chain"
     },
     {
      "text": "Assess for nuchal rigidity when meningeal irritation is suspected",
      "lr": "(neck stiffness, +LR 6.6 for subarachnoid hemorrhage; Carpenter 2016)",
      "tier": "B"
     }
    ]
   }
  ]
 },
 {
  "title": "Thorax and Lungs",
  "ros": "Cough, sputum, hemoptysis, wheeze, dyspnea, orthopnea, paroxysmal nocturnal dyspnea, pleuritic pain.",
  "note": "Lung ultrasound outperforms auscultation and supine radiography: pneumonia +LR ~16 (Chavez 2014); pneumothorax sens ~90% (lung-point sign ~100% specific); pleural effusion sens ~95%. B-lines are the bedside sign of cardiogenic edema (+LR ~9).",
  "groups": [
   {
    "name": "Core examination",
    "items": [
     {
      "text": "Inspect rate, rhythm, depth, effort, expiratory time"
     },
     {
      "text": "Inspect chest shape, size, symmetry"
     },
     {
      "text": "Inspect skin and chest landmarks"
     },
     {
      "text": "Compress the chest wall (anterior, lateral, posterior)"
     },
     {
      "text": "Assess chest expansion (anterior and posterior)"
     },
     {
      "text": "Assess tactile fremitus (anterior and posterior)",
      "lr": "(reduced fremitus is the best rule-out for effusion, \u2212LR 0.21; Wong 2009)",
      "tier": "C"
     },
     {
      "text": "Percuss \u2265 6 areas anterior and posterior, plus 2 lateral"
     },
     {
      "text": "Identify diaphragmatic excursion posteriorly"
     },
     {
      "text": "Auscultate \u2265 6 areas anterior and posterior, plus 2 lateral"
     }
    ]
   },
   {
    "name": "Special tests",
    "items": [
     {
      "text": "Bronchophony",
      "lr": "(egophony/bronchophony, +LR ~4\u20136 for consolidation)",
      "tier": "C"
     },
     {
      "text": "Egophony",
      "lr": "(\u201cE-to-A\u201d change, +LR ~4 for consolidation)",
      "tier": "C"
     },
     {
      "text": "Whispered pectoriloquy"
     }
    ]
   }
  ]
 },
 {
  "title": "Cardiovascular",
  "ros": "Chest pain, exertional dyspnea, palpitations, orthopnea/PND, edema, non-healing sores.",
  "note": "Echocardiography is the diagnostic standard for valve disease (ACC/AHA Class I); the exam decides whom to image. Heart-failure bedside signs: S3 +LR 11, JVP +LR 5.1, B-lines +LR ~9; a low BNP (< 100) is the best rule-out (\u2212LR 0.11).",
  "groups": [
   {
    "name": "Core examination",
    "items": [
     {
      "text": "Note general appearance, blood pressure, heart rate"
     },
     {
      "text": "Inspect neck: great vessels and carotid pulsation"
     },
     {
      "text": "Evaluate and measure the JVP at 45\u00b0",
      "lr": "(elevated JVP, +LR 4.1 for volume overload; Drum 2026)",
      "tier": "C"
     },
     {
      "text": "Auscultate the carotids for bruits"
     },
     {
      "text": "Palpate the carotid pulse: amplitude and contour"
     },
     {
      "text": "Inspect the anterior chest for the apical impulse (sitting, supine, LLD)"
     },
     {
      "text": "Palpate for thrills at 4 areas (bony hand)"
     },
     {
      "text": "Palpate for heaves and lifts at 4 areas (finger pads)"
     },
     {
      "text": "Palpate and locate the PMI"
     },
     {
      "text": "Auscultate 4 areas (bell and diaphragm), upright"
     },
     {
      "text": "Auscultate leaning forward (aortic regurgitation)"
     },
     {
      "text": "Auscultate in the left lateral decubitus (mitral, S3/S4)"
     }
    ]
   },
   {
    "name": "Special tests (dynamic auscultation)",
    "items": [
     {
      "text": "Squatting-to-standing maneuver (HOCM vs. others)"
     },
     {
      "text": "Valsalva maneuver"
     },
     {
      "text": "Isometric hand grip"
     }
    ]
   }
  ]
 },
 {
  "title": "Peripheral Vascular",
  "ros": "Claudication, leg cramps, varicosities, clot history, calf/leg swelling, color change with cold, cold extremities, non-healing wounds.",
  "note": "The ABI (< 0.9) is the bedside confirmatory test for PAD; exam sets the pretest probability. For suspected DVT, pair a validated Wells score with D-dimer and two-point compression ultrasound rather than calf signs.",
  "groups": [

const BREADTH_NOTE = "Programs may remove select items. The base items were selected to model the breadth a novice learner needs and the maneuvers tested on boards, even where practice has evolved. For standardized nationwide competence, teach the full breadth in the didactic phase and refine focused techniques and omissions through clinicals, residency, and practice.";

let mode = "comp";
const state = {
  scores: {},
  comp: { enabled: COMP.map(()=>true), local: COMP.map(()=>[]),
          opt:{ros:true, ev:true} },
  osce: { station: "comprehensive", inc: {}, local: {} }
};
try {
  const s = JSON.parse(localStorage.getItem("rubric_v04")||"null");
  if (s && s.comp && s.comp.local && s.comp.local.length===COMP.length){ Object.assign(state, s); }
  if (!state.scores) state.scores = {};
  if (!state.osce.inc) state.osce.inc = {};
  const pn = localStorage.getItem("rubric_progname"); if (pn) setTimeout(()=>{document.getElementById("progname").textContent=pn;},0);
} catch(e){}
function persist(){ try{
  localStorage.setItem("rubric_v04", JSON.stringify(state));
  localStorage.setItem("rubric_progname", document.getElementById("progname").textContent);
}catch(e){} }

function esc(t){ return String(t).replace(/&(?!amp;|lt;|gt;|#)/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---------- scoring ---------- */
function setScore(id,v){
  if (state.scores[id]===v) delete state.scores[id]; else state.scores[id]=v;
  render();
}
function ckToggle(id,checked){ if(checked) state.scores[id]=1; else delete state.scores[id]; render(); }
function pickCells(id,mx){
  const s=state.scores[id];
  let h="";
  for(let v=0;v<=mx;v++){
    h+=`<span class="pick ${s===v?"on":""}" role="button" tabindex="0" onclick="setScore('${id}',${v})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setScore('${id}',${v})}">${v}</span>`;
  }
  return h;
}

function setMode(m){
  mode=m;
  document.getElementById("mComp").classList.toggle("on", m==="comp");
  document.getElementById("mOsce").classList.toggle("on", m==="osce");
  render();
}

/* ---------- COMPREHENSIVE PE ---------- */
function compCount(i){ let n=COMP[i].groups.reduce((a,g)=>a+g.items.length,0); return n+state.comp.local[i].length; }
function asideComp(){
  const o=state.comp.opt;
  return `<div class="panel"><h2>Systems in this rubric</h2><div id="systoggles">`+
    COMP.map((s,i)=>`<label class="toggle"><input type="checkbox" ${state.comp.enabled[i]?"checked":""} onchange="state.comp.enabled[${i}]=this.checked;render()"> ${esc(s.title)}<span class="pts">${compCount(i)}</span></label>`).join("")+
    `</div><div class="mini"><button onclick="compAll(true)">All</button><button onclick="compAll(false)">None</button></div></div>
    <div class="panel"><h2>Display</h2>
      <label class="toggle"><input type="checkbox" ${o.ros?"checked":""} onchange="state.comp.opt.ros=this.checked;render()"> ROS screening lines</label>
      <label class="toggle"><input type="checkbox" ${o.ev?"checked":""} onchange="state.comp.opt.ev=this.checked;render()"> Evidence adjunct notes</label></div>
    <div class="panel about"><h2>About</h2><p>Base items are the published standard and are fixed. Rows you add are marked <b>program-specific</b> and print shaded. Check items as they are mastered or observed; the score populates automatically.</p>
      <p>${esc(BREADTH_NOTE)}</p>
      <div class="mini" style="margin-top:2px"><button onclick="exportConfig()">Export setup</button><button onclick="document.getElementById('cfgfile').click()">Import setup</button></div>
      <p style="margin-top:9px">Your program&rsquo;s additions and scores save on this device. <b>Export setup</b> to a file to move or share them.</p>
      <p>&copy; 2026 J. Moen &middot; CC BY-NC 4.0</p></div>`;
}
function compAll(v){ state.comp.enabled=COMP.map(()=>v); render(); }
function compRow(it,id){
  const on = state.scores[id]===1;
  return `<tr class="item"><td class="bx"><input type="checkbox" class="ck" ${on?"checked":""} onchange="ckToggle('${id}',this.checked)"></td><td class="what">${esc(it.text)}</td><td class="opts">${pickCells(id,1)}</td></tr>`;
}
function renderComp(){
  const o=state.comp.opt; let html="", total=0, earned=0;
  COMP.forEach((s,i)=>{
    if(!state.comp.enabled[i]) return;
    const n=compCount(i); total+=n;
    html+=`<section class="sys"><div class="sys-head"><h3>${esc(s.title)}</h3><span class="pts">${n} items &middot; ${n} pts</span></div>`;
    if(o.ros&&s.ros) html+=`<div class="ros"><b>ROS screen (ask &ge; 3):</b> ${esc(s.ros)}</div>`;
    html+=`<table class="items">`;
    s.groups.forEach((g,gi)=>{ html+=`<tr class="ghead"><td colspan="3">${esc(g.name)}</td></tr>`;
      g.items.forEach((it,ii)=>{ const id="c:"+i+":"+gi+":"+ii; earned+=state.scores[id]||0; html+=compRow(it,id); }); });
    if(state.comp.local[i].length){ html+=`<tr class="ghead"><td colspan="3">Program-specific additions</td></tr>`;
      state.comp.local[i].forEach((t,li)=>{ const id="cl:"+i+":"+li; earned+=state.scores[id]||0;
        html+=`<tr class="item local"><td class="bx"><input type="checkbox" class="ck" ${state.scores[id]===1?"checked":""} onchange="ckToggle('${id}',this.checked)"></td><td class="what">${esc(t)}<span class="local-chip">PROGRAM-SPECIFIC</span><button class="rm" onclick="state.comp.local[${i}].splice(${li},1);render()">&#x2715;</button></td><td class="opts">${pickCells(id,1)}</td></tr>`; }); }
    html+=`<tr class="addrow"><td colspan="3"><input placeholder="+ Add a program-specific item to ${esc(s.title)} (Enter)" onkeydown="if(event.key==='Enter'&&this.value.trim()){state.comp.local[${i}].push(this.value.trim());render()}"></td></tr></table>`;
    if(o.ev&&s.note) html+=`<div class="evnote"><b>Evidence adjunct:</b> ${esc(s.note)}</div>`;
    html+=`</section>`;
  });
  document.getElementById("sheettitle").textContent="Standardized Physical Examination Rubric";
  document.getElementById("sheetmeta").textContent="Comprehensive checklist · each item scored 0 / 1 (performed correctly / not)";
  document.getElementById("osceBanner").innerHTML="";
  document.getElementById("sheetfoot").innerHTML="<p>Base standard: <i>The Standardized Physical Examination</i> (J. Moen, 2026), CC BY-NC 4.0. Shaded rows are program-specific.</p><p>"+esc(BREADTH_NOTE)+"</p>";
  return {html: html||"<p style='color:var(--muted);padding:30px 0'>No systems selected.</p>", total, earned};
}

/* ---------- OSCE / SOAP (single SOAP-ordered spine; focused = base + program picks) ---------- */
function isComprehensive(){ return state.osce.station==="comprehensive"; }
function secIncluded(si){ return isComprehensive() || !!state.osce.inc[si]; }
function optSections(){
  const out=[];
  OSCE.spine.forEach((sec,si)=>{ if(sec.rows.some(r=>!r.base)) out.push(si); });
  return out;
}
function localKey(si){ return "sp:"+state.osce.station+":"+si; }
function osceAdd(si,val){ const k=localKey(si); (state.osce.local[k]=state.osce.local[k]||[]).push(val); render(); }
function osceRm(si,li){ state.osce.local[localKey(si)].splice(li,1); render(); }
function osceIncAll(v){ optSections().forEach(si=>{ state.osce.inc[si]=v; }); render(); }
function asideOsce(){
  let h=`<div class="panel"><h2>Station template</h2>
    <label class="radio"><input type="radio" name="stn" ${isComprehensive()?"checked":""} onchange="state.osce.station='comprehensive';render()"> Comprehensive (full breadth)</label>
    <label class="radio"><input type="radio" name="stn" ${!isComprehensive()?"checked":""} onchange="state.osce.station='focused';render()"> Focused (program-defined)</label>
    <p style="font-size:12px;color:var(--muted);margin:8px 0 0">One SOAP-ordered sheet. Base items (history, vitals, heart &amp; lung auscultation, A&amp;P, closure) are scored on every station in their natural position. A focused station is the base plus whichever exam sections your program selects.</p></div>`;
  if(!isComprehensive()){
    h+=`<div class="panel"><h2>Exam sections in this station</h2>`+
      optSections().map(si=>`<label class="toggle"><input type="checkbox" ${state.osce.inc[si]?"checked":""} onchange="state.osce.inc[${si}]=this.checked;render()"> ${esc(OSCE.spine[si].section)}</label>`).join("")+
      `<div class="mini"><button onclick="osceIncAll(true)">All</button><button onclick="osceIncAll(false)">None</button></div></div>`;
  }
  h+=`<div class="rulebox"><h2>Who scores what</h2>
      <div class="raters">
        <div class="rater"><span class="k">SOAP note</span><span>drives the content checklist below &mdash; automatable, auditable; documented items are counted, observer spot-checks deter over-documentation.</span></div>
        <div class="rater"><span class="k">Faculty</span><span>a global rating of integrated performance (also enables borderline-regression standard setting).</span></div>
        <div class="rater"><span class="k">SP</span><span>scores communication: rapport, transitions, summaries, teach-back.</span></div>
      </div></div>
    <div class="panel about"><h2>About</h2><p>Base + selected sections are the fixed standard. Add program-specific rows per section; they print shaded and chip-marked. Click a score on each row; the total populates automatically.</p>
      <p>${esc(BREADTH_NOTE)}</p>
      <div class="mini" style="margin-top:2px"><button onclick="exportConfig()">Export setup</button><button onclick="document.getElementById('cfgfile').click()">Import setup</button></div>
      <p style="margin-top:9px">Your program&rsquo;s additions and scores save on this device. <b>Export setup</b> to a file to move or share them.</p>
      <p>&copy; 2026 J. Moen &middot; CC BY-NC 4.0</p></div>`;
  return h;
}
function renderOsce(){
  let html="", total=0, earned=0, lastPhase=null;
  html+=`<table class="items">`;
  OSCE.spine.forEach((sec,si)=>{
    const inc=secIncluded(si);
    const rows=sec.rows.filter(r=>r.base||inc);
    const loc=inc ? (state.osce.local[localKey(si)]||[]) : [];
    if(!rows.length && !loc.length) return;
    if(sec.phase && sec.phase!==lastPhase){ html+=`<tr class="phase"><td colspan="2">${esc(sec.phase)}</td></tr>`; lastPhase=sec.phase; }
    html+=`<tr class="ghead"><td colspan="2">${esc(sec.section)}</td></tr>`;
    rows.forEach((row)=>{ const mx=row.max||1; total+=mx;
      const ri=sec.rows.indexOf(row);
      const id="o:"+si+":"+ri;
      earned+=state.scores[id]||0;
      html+=`<tr class="item"><td class="what">${esc(row.text)}</td><td class="opts">${pickCells(id,mx)}</td></tr>`; });
    if(inc){
      loc.forEach((t,li)=>{ total+=1; const id="ol:"+state.osce.station+":"+si+":"+li; earned+=state.scores[id]||0;
        html+=`<tr class="item local"><td class="what">${esc(t)}<span class="local-chip">PROGRAM-SPECIFIC</span><button class="rm" onclick="osceRm(${si},${li})">&#x2715;</button></td><td class="opts">${pickCells(id,1)}</td></tr>`; });
      html+=`<tr class="addrow"><td colspan="2"><input placeholder="+ Add program-specific item to ${esc(sec.section)} (Enter)" onkeydown="if(event.key==='Enter'&&this.value.trim()){osceAdd(${si},this.value.trim())}"></td></tr>`;
    }
  });
  html+=`</table>`;
  const label = isComprehensive() ? "Comprehensive station (full breadth)" : "Focused station (base + program-selected sections)";
  document.getElementById("sheettitle").textContent="OSCE Station Rubric (SOAP-scored)";
  document.getElementById("sheetmeta").textContent=label+" · content checklist scored from the SOAP note";
  document.getElementById("osceBanner").innerHTML=`<div class="osce-banner"><b>Three instruments per station.</b> This sheet is the <b>content checklist</b>, scored from the student&rsquo;s SOAP note, in SOAP order. Add the <b>faculty global rating</b> and the <b>standardized-patient communication</b> score for the full station result.</div>`;
  document.getElementById("sheetfoot").innerHTML="<p>Items appear in SOAP order; base items are scored on every station. Shaded rows are program-specific additions.</p><p>"+esc(BREADTH_NOTE)+"</p><p>&copy; 2026 J. Moen &middot; CC BY-NC 4.0.</p>";
  return {html, total, earned};
}

function render(){
  document.getElementById("aside").innerHTML = mode==="comp" ? asideComp() : asideOsce();
  const r = mode==="comp" ? renderComp() : renderOsce();
  document.getElementById("sections").innerHTML = r.html;
  document.getElementById("scorechip").textContent = `Score ${r.earned} / ${r.total}`;
  document.getElementById("sheettot").innerHTML = `Score: <span class="live">${r.earned}</span> / ${r.total}`;
  persist();
}

/* ---------- export to Word (.doc) ---------- */
function fname(){
  const pn=(document.getElementById("progname").textContent||"rubric").replace(/[^A-Za-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,40)||"rubric";
  return pn+"-"+(mode==="comp"?"PE-checklist":"OSCE-"+state.osce.station);
}
function exportDoc(){
  const clone=document.getElementById("sheet").cloneNode(true);
  clone.querySelectorAll("input.ck").forEach(cb=>{ const s=document.createElement("span"); s.textContent=cb.checked?"☑":"☐"; s.style.fontSize="13pt"; cb.replaceWith(s); });
  clone.querySelectorAll("td.opts").forEach(td=>{
    const picks=[...td.querySelectorAll(".pick")];
    if(!picks.length) return;
    td.textContent = picks.map(p=>p.classList.contains("on") ? "["+p.textContent+"]" : " "+p.textContent+" ").join(" ");
  });
  clone.querySelectorAll(".addrow, .rm").forEach(n=>n.remove());
  const docStyle="<style>"+
    "body{font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#1B2A3A}"+
    "h2{color:#1F4E78;font-size:16pt;margin:0 0 4pt}"+
    ".prog{color:#5B6B7B;font-size:9pt;letter-spacing:1pt;text-transform:uppercase}"+
    ".meta,.sheet-foot,.osce-banner{color:#5B6B7B;font-size:9pt}"+
    ".idline span{border-bottom:1px solid #999;padding-right:24pt}"+
    "table{width:100%;border-collapse:collapse;margin-top:6pt}"+
    "td{border:0.5pt solid #C7D2DC;padding:3pt 6pt;font-size:10pt;vertical-align:top}"+
    "tr.phase td{background:#1F4E78;color:#fff;font-weight:bold;letter-spacing:1pt;text-transform:uppercase}"+
    ".ghead td{background:#EAF1F8;color:#1F4E78;font-weight:bold}"+
    "td.bx{width:20pt;text-align:center}td.opts,td.score{text-align:right;color:#5B6B7B;white-space:nowrap}"+
    "tr.local td{background:#FDF3E7}.local-chip{color:#8A4B12;font-size:7pt;font-weight:bold}"+
    "</style>";
  const html="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>"+
    "<head><meta charset='utf-8'><title>"+esc(fname())+"</title>"+docStyle+"</head><body>"+clone.innerHTML+"</body></html>";
  const blob=new Blob(["﻿"+html],{type:"application/msword"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname()+".doc";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}

/* ---------- program setup: export / import config ---------- */
function exportConfig(){
  const cfg={ v:4, progname:document.getElementById("progname").textContent, state:state };
  const blob=new Blob([JSON.stringify(cfg,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname()+"-setup.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function importConfig(input){
  const f=input.files&&input.files[0]; if(!f){ return; }
  const rd=new FileReader();
  rd.onload=function(){
    try{
      const cfg=JSON.parse(rd.result); const s=(cfg&&cfg.state)?cfg.state:cfg;
      if(s&&s.comp&&s.comp.local&&s.comp.local.length===COMP.length){
        Object.assign(state,s);
        if(!state.scores) state.scores={};
        if(!state.osce.inc) state.osce.inc={};
        if(cfg&&cfg.progname) document.getElementById("progname").textContent=cfg.progname;
        persist(); render();
      } else { alert("That file does not match this rubric version and was not loaded."); }
    }catch(e){ alert("Could not read that setup file."); }
    input.value="";
  };
  rd.readAsText(f);
}

document.getElementById("progname").addEventListener("input", persist);
render();
</script>
